#
# ============================================================
#  HYPRLAND MAIN CONFIGURATION
# ============================================================

# 1. VARIABLES
# Modifier keys, terminal, and default applications.
source = ~/.config/hypr/conf.d/variables.conf

# 2. MONITOR & WORKSPACE
# Monitor outputs and workspace assignments.
source = ~/.config/hypr/conf.d/monitor.conf

# 3. INPUT
# Keyboard, touchpad, and cursor settings.
source = ~/.config/hypr/conf.d/input.conf

# 4. VISUAL & THEME
# Gaps, borders, blur, animations, and UI styling.
source = ~/.config/hypr/conf.d/theme.conf

# 5. KEYBINDINGS
# Keyboard shortcuts.
source = ~/.config/hypr/conf.d/keybinds.conf

# 6. AUTOSTART
# Background services and daemons.
source = ~/.config/hypr/conf.d/autostart.conf

# 7. WINDOW RULES
# Floating rules, opacity, and popup handling.
source = ~/.config/hypr/conf.d/windowrules.conf
