# ============================================================
# Pengganti swayidle — menggunakan hypridle

general {
    lock_cmd         = pidof hyprlock || (hyprlock & sleep 0.5 && hyprctl dispatch dpms off)  # Lock dan matikan layar segera
    before_sleep_cmd = loginctl lock-session       # Lock sebelum suspend
    after_sleep_cmd  = hyprctl dispatch dpms on    # Nyalakan layar setelah wake
    ignore_dbus_inhibit = false
}

# Peringatan sebelum layar mati (optional notif)
listener {
    timeout  = 270
    on-timeout = notify-send -u low -t 30000 "Idle" "Screen will turn off in 30s..."
}

# Kunci layar setelah 300 detik idle
listener {
    timeout  = 300
    on-timeout = loginctl lock-session
}
