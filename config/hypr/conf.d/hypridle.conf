# ============================================================
# Replacement for swayidle — using hypridle

general {
    lock_cmd         = pidof hyprlock || hyprlock  # Lock only
    before_sleep_cmd = loginctl lock-session       # Lock before suspend
    ignore_dbus_inhibit = false
}

# Warning before system suspends (optional notification)
listener {
    timeout  = 270
    on-timeout = notify-send -u low -t 30000 "Idle" "System will suspend in 30s..."
}

# Suspend system after 300 seconds of idle
listener {
    timeout  = 300
    on-timeout = systemctl suspend
}
