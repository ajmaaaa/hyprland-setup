# ============================================================

# --- MOUSE ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# =============================================================
# APPLICATIONS
# =============================================================

bind = $mod, Return,       exec, $term
bind = $mod, Q,            killactive
bind = $mod, Space,        exec, ~/.config/hypr/scripts/rofi-launcher.sh
bind = $mod, F,            exec, $files
bind = $mod, Z,            exec, $browser1
bind = $mod, B,            exec, $browser2
bind = $mod, X,            exec, $browser3
bind = $mod, C,            exec, antigravity-ide
bind = $mod, N,            exec, $term -e nvim
bind = $mod, V,            exec, protonvpn-app
bind = $mod, P,            exec, ~/.config/hypr/scripts/display-monitor.sh

# =============================================================
# SYSTEM CONTROLS
# =============================================================

bind = $mod SHIFT, C,      exec, hyprctl reload
bind = $mod SHIFT, E,      exec, ~/.config/rofi/powermenu_active.sh
bind = $mod, BackSpace,    exec, ~/.config/rofi/powermenu_active.sh
bind = $mod SHIFT, W,      exec, ~/.config/hypr/scripts/toggle-wallpaper.sh
bind = $mod SHIFT, N,      exec, ~/.config/hypr/scripts/toggle-theme.sh
bind = $mod, slash,        exec, ~/.config/hypr/scripts/keybinds-help.sh

# --- ROFI ADDONS ---
bind = $mod ALT, right,    exec, ~/.config/hypr/scripts/rofi-cycler.sh launcher style
bind = $mod ALT, down,     exec, ~/.config/hypr/scripts/rofi-cycler.sh launcher type
bind = $mod ALT, left,     exec, ~/.config/hypr/scripts/rofi-cycler.sh powermenu style
bind = $mod ALT, up,       exec, ~/.config/hypr/scripts/rofi-cycler.sh powermenu type
bind = $mod SHIFT, S,      exec, ~/.config/rofi/applets/bin/screenshot.sh
bind = $mod, A,            exec, ~/.config/rofi/applets/bin/apps.sh
bind = $mod, M,            exec, ~/.config/rofi/applets/bin/mpd.sh

# =============================================================
# HARDWARE & MEDIA
# =============================================================

bindel = , XF86AudioMute,        exec, ~/.config/hypr/scripts/osd.sh vol_mute
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd.sh vol_down
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd.sh vol_up
bindel = , XF86MonBrightnessDown,exec, ~/.config/hypr/scripts/osd.sh bright_down
bindel = , XF86MonBrightnessUp,  exec, ~/.config/hypr/scripts/osd.sh bright_up
bind  = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Fallback (laptop function keys)
bind = , F1, exec, ~/.config/hypr/scripts/osd.sh vol_mute
bind = , F2, exec, ~/.config/hypr/scripts/osd.sh vol_down
bind = , F3, exec, ~/.config/hypr/scripts/osd.sh vol_up
bind = , F5, exec, ~/.config/hypr/scripts/osd.sh bright_down
bind = , F6, exec, ~/.config/hypr/scripts/osd.sh bright_up

# =============================================================
# SCREENSHOTS
# =============================================================

bind = , Print,       exec, sh -c 'mkdir -p ~/Pictures/Screenshots && FILE=~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && grim -g "$(slurp)" - | swappy -f - -o "$FILE" && wl-copy < "$FILE"'
bind = SHIFT, Print,  exec, sh -c 'mkdir -p ~/Pictures/Screenshots && FILE=~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && grim - | swappy -f - -o "$FILE" && wl-copy < "$FILE"'

# =============================================================
# WINDOW NAVIGATION (Vim-style ‚ÄĒ focus)
# =============================================================

bind = $mod, $left,   movefocus, l
bind = $mod, $down,   movefocus, d
bind = $mod, $up,     movefocus, u
bind = $mod, $right,  movefocus, r

# =============================================================
# WINDOW CONTROL (Arrow keys)
# =============================================================

# Arrow keys ‚Üí pindah window + fullscreen
bind = $mod, left,    movewindow, l
bind = $mod, right,   movewindow, r
bind = $mod, up,      fullscreen, 1        # Maximize (keep gaps)
bind = $mod, down,    fullscreen, 0        # Unfullscreen / restore

# Alt+V ‚Üí split vertical (seperti sway dulu)
bind = $mod ALT, V,   layoutmsg, togglesplit

# =============================================================
# FLOATING
# =============================================================

bind = $mod SHIFT, Space, togglefloating
bind = $mod SHIFT, F,     fullscreen, 0   # True fullscreen toggle

# =============================================================
# SPECIAL WORKSPACE (Scratchpad)
# =============================================================

bind = $mod, minus,       togglespecialworkspace, magic
bind = $mod SHIFT, minus, movetoworkspace, special:magic

# =============================================================
# WORKSPACES
# =============================================================

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# --- MOVE WINDOW TO WORKSPACE ---
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# =============================================================
# RESIZE (hold $mod + R, then arrow keys / HJKL)
# =============================================================

bind  = $mod, R, submap, resize
submap = resize

binde = , $left,  resizeactive, -30 0
binde = , $down,  resizeactive, 0 30
binde = , $up,    resizeactive, 0 -30
binde = , $right, resizeactive, 30 0

binde = , left,   resizeactive, -30 0
binde = , down,   resizeactive, 0 30
binde = , up,     resizeactive, 0 -30
binde = , right,  resizeactive, 30 0

bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset
