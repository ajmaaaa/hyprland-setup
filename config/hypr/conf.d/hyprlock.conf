# Pengganti swaylock — lockscreen Hyprland native

general {
    disable_loading_bar   = false
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    ignore_empty_input    = true
}

background {
    monitor     =
    path        = $HOME/Pictures/Wallpapers/muichiro-tokito.png
    blur_size   = 8
    blur_passes = 2
    brightness  = 0.5
    contrast    = 0.8
    vibrancy    = 0.2
}

input-field {
    monitor         =
    size            = 300, 50
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.2
    outer_color     = rgba(c0c0c0ff)
    inner_color     = rgba(0000004d)
    font_color      = rgba(ffffffff)
    fade_on_empty   = true
    placeholder_text = <span foreground='##c0c0c0' font_size='13'>Password</span>
    hide_input      = false
    rounding        = 8

    position        = 0, -100
    halign          = center
    valign          = center
}

label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(ffffffff)
    font_size   = 96
    font_family = RedHatDisplay, JetBrainsMono Nerd Font Bold

    position    = 0, 200
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color       = rgba(e0e0e0ff)
    font_size   = 20
    font_family = RedHatDisplay, JetBrainsMono Nerd Font

    position    = 0, 120
    halign      = center
    valign      = center
}
