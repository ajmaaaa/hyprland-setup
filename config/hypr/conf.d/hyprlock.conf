# ============================================================
# replacement for swaylock — native Hyprland lockscreen

general {
    hide_cursor           = true
    ignore_empty_input    = true
}

animations {
    enabled = true
    animation = fade, 0, 1, default
}

background {
    monitor     =
    color       = rgb(000000)
}

input-field {
    monitor         =
    size            = 250, 40
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.2
    outer_color     = rgb(c0c0c0)
    inner_color     = rgba(0000004d)
    font_color      = rgb(ffffff)
    fade_on_empty   = false
    placeholder_text = <span foreground='##c0c0c0' font_size='11'>Password</span>
    hide_input      = false
    rounding        = 15
    check_color     = rgb(ffffff)
    fail_color      = rgb(ff605c)

    position        = 0, -100
    halign          = center
    valign          = center
}

label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(ffffffff)
    font_size   = 96
    font_family = RedHatDisplay, JetBrainsMono Nerd Font Bold

    position    = 0, 200
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color       = rgba(e0e0e0ff)
    font_size   = 20
    font_family = RedHatDisplay, JetBrainsMono Nerd Font

    position    = 0, 120
    halign      = center
    valign      = center
}
