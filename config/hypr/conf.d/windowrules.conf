# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀  █▀▄ █▄█ █▄▄ ██▄ ▄█
# ============================================================
# Hyprland windowrulev2 — mengatasi masalah popup/floating
# yang jadi keterbatasan utama SwayFX
# ============================================================

# =============================================================
# FLOATING RULES — Dialog, Popup, Splash
# =============================================================

windowrulev2 = float, title:^(.*)(\bconfirm\b|\bdialog\b|\bprompt\b|\balert\b)(.*)$
windowrulev2 = center 1, title:^(.*)(\bconfirm\b|\bdialog\b|\bprompt\b|\balert\b)(.*)$
windowrulev2 = float, xdg_tag:^(dialog|modal)$
windowrulev2 = center 1, xdg_tag:^(dialog|modal)$
windowrulev2 = float, modal:1
windowrulev2 = center 1, modal:1
windowrulev2 = float, initialClass:^(file_progress)$
windowrulev2 = center 1, initialClass:^(file_progress)$
windowrulev2 = float, class:^(org.freedesktop.impl.portal.desktop.kde)$
windowrulev2 = center 1, class:^(org.freedesktop.impl.portal.desktop.kde)$

# Window kecil jadi floating otomatis (fix Zoom pencil popup, dll.)
windowrulev2 = float, xwayland:1, size < 800 600

# =============================================================
# ZOOM — Fix popup annotation / pencil overlay
# =============================================================

windowrulev2 = float,      class:^(zoom)$
windowrulev2 = float,      title:^(Zoom)(.*)$
windowrulev2 = nofocus,    title:^(zoom)$, class:^(zoom)$
windowrulev2 = noblur,     title:^(zoom)$, class:^(zoom)$
windowrulev2 = noshadow,   title:^(zoom)$, class:^(zoom)$

# Zoom main window — tetap tiling
windowrulev2 = tile, title:^(Zoom Meeting)(.*)$

# =============================================================
# PACKETTRACER — sama seperti sway
# =============================================================

windowrulev2 = float,    class:^(PacketTracer)$
windowrulev2 = tile,     class:^(PacketTracer)$, title:^(Cisco Packet Tracer)$
windowrulev2 = rounding 8, class:^(PacketTracer)$

# =============================================================
# FILE DIALOGS
# =============================================================

windowrulev2 = float,      class:^(xdg-desktop-portal-gtk)$
windowrulev2 = size 60% 60%, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = center 1,   class:^(xdg-desktop-portal-gtk)$

windowrulev2 = float,      title:^(Open File)(.*)$
windowrulev2 = size 60% 60%, title:^(Open File)(.*)$
windowrulev2 = center 1,   title:^(Open File)(.*)$

windowrulev2 = float,      title:^(Open Folder)(.*)$
windowrulev2 = size 60% 60%, title:^(Open Folder)(.*)$
windowrulev2 = center 1,   title:^(Open Folder)(.*)$

windowrulev2 = float,      title:^(Select a File)(.*)$
windowrulev2 = size 60% 60%, title:^(Select a File)(.*)$
windowrulev2 = center 1,   title:^(Select a File)(.*)$

windowrulev2 = float,      title:^(Select Folder)(.*)$
windowrulev2 = size 60% 60%, title:^(Select Folder)(.*)$
windowrulev2 = center 1,   title:^(Select Folder)(.*)$

windowrulev2 = float,      title:^(Choose wallpaper)(.*)$
windowrulev2 = size 60% 60%, title:^(Choose wallpaper)(.*)$
windowrulev2 = center 1,   title:^(Choose wallpaper)(.*)$

windowrulev2 = float,      title:^(Save File)(.*)$
windowrulev2 = size 60% 60%, title:^(Save File)(.*)$
windowrulev2 = center 1,   title:^(Save File)(.*)$

# =============================================================
# COMMON POPUP APPS
# =============================================================

windowrulev2 = float,    class:^(pavucontrol)$
windowrulev2 = float,    class:^(blueman-manager)$
windowrulev2 = float,    class:^(nm-connection-editor)$
windowrulev2 = float,    class:^(polkit-kde-authentication-agent-1)$

# =============================================================
# OPACITY
# =============================================================

windowrulev2 = opacity 0.75 0.70, class:^(alacritty)$
windowrulev2 = opacity 0.95 0.90, class:^(dolphin)$
