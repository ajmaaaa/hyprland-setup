# ============================================================

# --- LAPTOP DISPLAY ---
monitor = eDP-1, 1920x1080, 0x0, 1

# --- EXTERNAL MONITOR (HDMI) ---
# Auto-detect HDMI — place to the right of the laptop
monitor = HDMI-A-1, 1920x1080, 1920x0, 1

# Fallback: any unrecognized monitor — use preferred resolution at auto position
monitor = , preferred, auto, 1

# --- WORKSPACE ASSIGNMENTS ---

# Laptop Display (eDP-1): Workspace 1-5
workspace = 1,  monitor:eDP-1
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1

# External Monitor (HDMI-A-1): Workspace 6-10
workspace = 6,  monitor:HDMI-A-1
workspace = 7,  monitor:HDMI-A-1
workspace = 8,  monitor:HDMI-A-1
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1
