# ████████╗██╗  ██╗███████╗███╗   ███╗███████╗
# ╚══██╔══╝██║  ██║██╔════╝████╗ ████║██╔════╝
#    ██║   ███████║█████╗  ██╔████╔██║█████╗
#    ██║   ██╔══██║██╔══╝  ██║╚██╔╝██║██╔══╝
#    ██║   ██║  ██║███████╗██║ ╚═╝ ██║███████╗
#    ╚═╝   ╚═╝  ╚═╝╚══════╝╚═╝     ╚═╝╚══════╝
# ============================================================

general {
    # --- GAPS & BORDERS ---
    gaps_in  = 6
    gaps_out = 6

    border_size = 1

    # Celestial colors (white active border, grey inactive)
    col.active_border   = rgba(ffffffff)
    col.inactive_border = rgba(333333ff)

    # --- LAYOUT ---
    layout = dwindle  # dwindle (binary split, similar to sway) or master
}

decoration {
    # --- ROUNDED CORNERS ---
    rounding = 8

    # --- BLUR ---
    blur {
        enabled         = true
        size            = 8
        passes          = 2
        new_optimizations = true
        xray            = false
        noise           = 0.02
        contrast        = 0.9
        brightness      = 0.8
    }

    # --- SHADOW ---
    shadow {
        enabled         = true
        range           = 12
        render_power    = 3
        color           = rgba(1a1a2ecc)
        color_inactive  = rgba(1a1a2e66)
    }

    # --- OPACITY ---
    active_opacity   = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
}

animations {
    enabled = false

    # --- BEZIER CURVES ---
    bezier = smoothOut,   0.36, 0, 0.66, -0.56
    bezier = smoothIn,    0.25, 1, 0.5,  1
    bezier = overshot,    0.05, 0.9, 0.1, 1.05
    bezier = linear,      0.0, 0.0, 1.0, 1.0

    # --- ANIMATIONS ---
    animation = windows,     1, 5,  overshot, slide
    animation = windowsOut,  1, 4,  smoothOut, slide
    animation = windowsMove, 1, 4,  smoothIn
    animation = fade,        1, 5,  smoothIn
    animation = fadeOut,     1, 4,  smoothOut
    animation = border,      1, 10, linear
    animation = workspaces,  1, 5,  overshot, slidevert
}

dwindle {
    # Similar to sway autotiling — splits automatically based on window size
    pseudotile             = false
    preserve_split         = true
    smart_split            = false
    smart_resizing         = true
}

master {
    new_status      = master
    mfact           = 0.55
}

misc {
    force_default_wallpaper = 0   # Disable Hyprland default wallpaper
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    background_color        = 0x000000
    animate_manual_resizes  = true
    enable_swallow          = true
    swallow_regex           = ^(alacritty)$
    key_press_enables_dpms = true
    mouse_move_enables_dpms = false
}
